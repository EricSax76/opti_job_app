<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="infojobs_flutter_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>infojobs_flutter_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Enables Firebase App Check debug token flow on local web development.
    if (
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
    ) {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
      console.info(
        "[AppCheck] FIREBASE_APPCHECK_DEBUG_TOKEN enabled for localhost."
      );
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
